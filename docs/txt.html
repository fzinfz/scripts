<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Text Tools</title>
    <link rel="shortcut icon" href="#">
    <link href="https://ajax.aspnetcdn.com/ajax/bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet"
          crossorigin="anonymous">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
<div class="container" id="app">
    <div class="container my-1">
        <div class="d-flex justify-content-between">
            <div>
                <a href="https://ferro.pro" class="mr-1" target="_blank">Home</a>
            </div>
            <div>
                <h4 class="text-muted">Text Tools</h4>
            </div>
            <div>
                <a href="https://github.com/fzinfz/scripts/blob/master/docs/txt.html" class="mr-1" target="_blank">Vue
                    Source</a>
            </div>
        </div>
    </div>

    <div class="container my-1">
        <div class="my-2">
            <textarea class="form-control" id="input" ref="input" style="height: 250px" v-model="input"></textarea>
        </div>
        <div class="my-1">
            <div class="my-2">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="action" value="action1" id="action1"
                           v-model="action">
                    <label class="form-check-label" for="action1">Split by /<input v-model="options.action1.sep">/, columns
                        <input size="5" v-model="options.action1.limit" @focus="$event.target.select()"></label>
                </div>
                <div class="d-flex justify-content-between pt-1">
                    <label>Output separator(Default: Tab): <input v-model="output_sep"></label>
                    <button id="btn_copy" class="btn btn-info m-1" @click="copy">{{ copy_btn_text }}</button>
                </div>
            </div>
            <div class="form-check my-2">
                <input class="form-check-input" type="radio" name="action" value="action2" id="action2"
                       v-model="action">
                <label class="form-check-label" for="action2">Filter lines if /<input v-model="options.action2.filter">/</label>
            </div>
            <div class="my-2">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="action" value="action3" id="action3"
                           v-model="action">
                    <label class="form-check-label" for="action3">Replace /<input v-model="options.action3.pattern">
                        /<input size="6" v-model="options.action3.flags">
                        (<a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Regular_Expressions#advanced_searching_with_flags"
                            target="_blank">ReFlags</a>)
                        to <input v-model="options.action3.target"></label>
                </div>
            </div>
            <div class="form-check my-2">
                <input class="form-check-input" type="radio" name="action" value="action4" id="action4"
                       v-model="action">
                <label class="form-check-label" for="action4">Sum all numbers (support thousand separators)</label>
            </div>
            <div class="form-check my-2">
                <input class="form-check-input" type="radio" name="action" value="action5" id="action5"
                       v-model="action">
                <label class="form-check-label" for="action5">Reformat Docker command</label>
            </div>
        </div>
    </div>
    <div class="my-2">
        <textarea class="form-control" id="output" ref="output" style="height: 500px">{{ output }}</textarea>
    </div>
</div>
<script>
    const {createApp} = Vue;

    createApp({
        data() {
            return {
                input: "Input text here, then select an action, and modify RegEx below",
                action: "action5",
                output_sep: "\\t",
                copy_btn_text: "Copy Output",
                options: {
                    action1: { sep: ",", limit: -1 },
                    action2: { filter: "^\\d" },
                    action3: { pattern: "[、，,]", flags: "g", target: "" },
                    action4: { },
                    action5: { }
                },
                output: ""
            };
        },
        mounted() {
            this.$refs.input.select();
        },
        watch: {
            input: "process",
            action: "process",
            output_sep: "process",
            options: {
                handler() { this.process(); },
                deep: true
            }
        },
        methods: {
            process() {
                const lines = this.input.split("\n");

                if (this.action === "action4") {
                    this.output = this.sumNumbersAllLines(lines);
                    return;
                }

                if (this.action === "action5") {
                    this.output = lines.map(line => this.reformatDockerCmd(line.trim())).join("\n");
                    return;
                }

                const result = lines
                    .map(line => this.transformLine(line))
                    .filter(Boolean)
                    .join("\n");
                this.output = result;
            },

            transformLine(line) {
                const sep = this.output_sep.replace(/\\t/g, "\t");

                switch (this.action) {
                    case "action1":
                        return line.split(new RegExp(this.options.action1.sep), this.options.action1.limit).join(sep);

                    case "action2":
                        return new RegExp(this.options.action2.filter).test(line) ? line : null;

                    case "action3":
                        return line.replace(new RegExp(this.options.action3.pattern, this.options.action3.flags), this.options.action3.target);

                    default:
                        return null;
                }
            },

            sumNumbersAllLines(lines) {
                const regex = /-?[\d,]+(?:\.\d+)?/g;
                const allMatches = [];

                lines.forEach(line => {
                    let match;
                    while ((match = regex.exec(line)) !== null) {
                        allMatches.push(match[0]);
                    }
                });

                if (allMatches.length === 0) return "";

                const cleanMatches = allMatches.map(m => m.replace(/,/g, ""));

                const total = allMatches.reduce((sum, numStr) => {
                    const cleanNum = parseFloat(numStr.replace(/,/g, ""));
                    return sum + (isNaN(cleanNum) ? 0 : cleanNum);
                }, 0);

                const formattedTotal = Number.isInteger(total) ? total.toString() : total.toFixed(2);
                const resultLines = [`${cleanMatches.join(" + ")}`, `= ${formattedTotal}`];

                if (!Number.isInteger(total)) {
                    resultLines.push(`≈ ${Math.floor(total)}`);
                }

                return resultLines.join("\n");
            },

            reformatDockerCmd(cmd) {
                if (!cmd || !cmd.startsWith("docker ")) return cmd;

                const tokens = [];
                const regex = /[^\s"']+|"([^"]*)"|'([^']*)'/g;
                let match;
                while ((match = regex.exec(cmd)) !== null) {
                    tokens.push(match[1] !== undefined ? match[1] : match[2] !== undefined ? match[2] : match[0]);
                }

                if (tokens.length <= 2) return cmd;

                const prefix = tokens.slice(0, 2).join(" ");
                const args = tokens.slice(2);

                const flagArgs = []; // 无 value 参数
                const paramArgs = []; // 参数+value 对
                const remaining = []; // 最后剩余的非参数值（如镜像名）

                let i = 0;
                while (i < args.length) {
                    if (args[i].startsWith("-")) {
                        if (i + 1 < args.length && !args[i + 1].startsWith("-")) {
                            paramArgs.push(`${args[i]} ${args[i + 1]}`);
                            i += 2;
                        } else {
                            flagArgs.push(args[i]);
                            i += 1;
                        }
                    } else {
                        remaining.push(args[i]);
                        i += 1;
                    }
                }

                const lines = [];
                const hasFollowing = paramArgs.length > 0 || remaining.length > 0;
                if (flagArgs.length > 0) {
                    lines.push(`${prefix} ${flagArgs.join(" ")}${hasFollowing ? " \\" : ""}`);
                } else {
                    lines.push(`${prefix}${hasFollowing ? " \\" : ""}`);
                }

                paramArgs.forEach((arg, idx) => {
                    const isLast = idx === paramArgs.length - 1 && remaining.length === 0;
                    lines.push(isLast ? arg : `${arg} \\`);
                });

                if (remaining.length > 0) {
                    lines.push(remaining.join(" "));
                }

                return lines.join("\n");
            },

            copy() {
                const text = this.$refs.output.value;
                navigator.clipboard.writeText(text).then(
                    () => {
                        this.copy_btn_text = `${text.length} chars copied`;
                        setTimeout(() => { this.copy_btn_text = "Copy Output"; }, 2000);
                    },
                    () => {
                        console.log(`${new Date().toLocaleString()} : clipboard write failed`);
                    }
                );
            }
        }
    }).mount("#app");
</script>
</body>
</html>
